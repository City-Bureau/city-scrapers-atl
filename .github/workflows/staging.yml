name: Staging

on:
  schedule:
    - cron: "0 5 * * *"
  push:
    branches:
      - staging
  workflow_dispatch:

env:
  CI: true
  PYTHON_VERSION: 3.11
  PIPENV_VENV_IN_PROJECT: true
  CITY_SCRAPERS_ENV: staging
  SCRAPY_SETTINGS_MODULE: city_scrapers.settings.staging
  AUTOTHROTTLE_MAX_DELAY: 30.0
  AUTOTHROTTLE_START_DELAY: 1.5
  AUTOTHROTTLE_TARGET_CONCURRENCY: 3.0
  AZURE_ACCOUNT_KEY: ${{ secrets.AZURE_ACCOUNT_KEY }}
  AZURE_ACCOUNT_NAME: ${{ secrets.AZURE_ACCOUNT_NAME }}
  AZURE_STAGING_CONTAINER: ${{ secrets.AZURE_STAGING_CONTAINER }}
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  OPENVPN_USER: ${{ secrets.OPENVPN_USER }}
  OPENVPN_PASS: ${{ secrets.OPENVPN_PASS }}
  OPENVPN_CONFIG: ${{ secrets.OPENVPN_CONFIG }}

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging

      - name: Connect to OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn
          echo "$OPENVPN_USER" | sudo tee -a /etc/openvpn/client/auth
          echo "$OPENVPN_PASS" | sudo tee -a /etc/openvpn/client/auth
          echo "$OPENVPN_CONFIG" | sudo tee -a /etc/openvpn/ovpn.conf
          sudo openvpn --config /etc/openvpn/ovpn.conf --daemon
          sleep 120

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Pipenv
        run: |
          python -m pip install --upgrade pip
          pip install pipenv

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ env.PYTHON_VERSION }}-${{ hashFiles('**/Pipfile.lock') }}
          restore-keys: |
            ${{ env.PYTHON_VERSION }}-
            pip-

      - name: Check and conditionally remove invalid virtual environment
        run: |
          if [ -d ".venv" ] && [ ! -f ".venv/bin/python" ]; then
            echo "Virtual environment exists but Python executable is missing. Rebuilding."
            rm -rf .venv
          elif [ ! -d ".venv" ]; then
            echo "No virtual environment found. Will build new one."
          else
            echo "Virtual environment appears valid. Reusing."
          fi

      - name: Install dependencies
        run: pipenv sync
        env:
          PIPENV_DEFAULT_PYTHON_VERSION: ${{ env.PYTHON_VERSION }}

      - name: Install Playwright browser
        run: pipenv run playwright install --with-deps chromium

      - name: Akamai bypass smoke test (citycouncil.atlantaga.gov)
        # Fail fast if curl-cffi can't reach the Akamai-protected calendar.
        # Saves ~25 min of full crawl when bypass is broken. Runs through the
        # OpenVPN egress, so this reflects the real production egress IP.
        run: |
          pipenv run python - <<'PY'
          import sys
          from curl_cffi import requests
          urls = [
              f"https://citycouncil.atlantaga.gov/other/events/public-meetings/-curm-{m}/-cury-2026"
              for m in (6, 5, 4)
          ]
          failures = []
          for u in urls:
              try:
                  r = requests.get(u, impersonate="chrome131", timeout=30)
                  print(f"  {r.status_code}  size={len(r.text):>7}  {u[-30:]}")
                  if r.status_code != 200:
                      failures.append((u, r.status_code))
              except Exception as e:
                  print(f"  ERR                {u[-30:]}  {e}")
                  failures.append((u, str(e)))
          if failures:
              print(f"::error::Akamai bypass failed for {len(failures)}/{len(urls)} URLs")
              sys.exit(1)
          print("Akamai bypass OK — proceeding to full crawl")
          PY

      - name: Smoke crawl atl_water_and_sewer_appeals_board
        # Run only the Akamai-protected spider before the full crawl. If it
        # produces 0 items, fail fast — saves ~25 min on the rest when this
        # one spider is broken (Akamai 403, SharePoint cookie expiry, etc.).
        # Output goes to /tmp (not Azure) so the smoke is side-effect free.
        run: |
          export PYTHONPATH=$(pwd):$PYTHONPATH
          pipenv run scrapy crawl atl_water_and_sewer_appeals_board \
            -O /tmp/atl_water.jsonl:jsonlines -L INFO
          items=$(wc -l < /tmp/atl_water.jsonl 2>/dev/null || echo 0)
          echo "::notice::atl_water scraped ${items} items"
          if [ "${items}" -eq 0 ]; then
            echo "::error::atl_water spider produced 0 items"
            exit 1
          fi

      - name: Run scrapers
        run: |
          export PYTHONPATH=$(pwd):$PYTHONPATH
          ./.deploy.sh

      - name: Combine output feeds
        run: |
          export PYTHONPATH=$(pwd):$PYTHONPATH
          pipenv run scrapy combinefeeds -s LOG_ENABLED=False

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
