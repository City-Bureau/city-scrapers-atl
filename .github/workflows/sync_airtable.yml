name: Sync spiders to Airtable
 
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'city_scrapers/spiders/**.py'

env:
  PYTHON_VERSION: 3.11
  PIPENV_VENV_IN_PROJECT: true
  AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
  AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
  AIRTABLE_TABLE: ${{ secrets.AIRTABLE_TABLE_ID }} 

jobs:
  sync-airtable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for diffing against base
 
      - uses: tj-actions/changed-files@v45
        id: changed
        with:
          files: city_scrapers/spiders/**.py

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Pipenv
        run: |
          python -m pip install --upgrade pip
          pip install pipenv

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ env.PYTHON_VERSION }}-${{ hashFiles('**/Pipfile.lock') }}
          restore-keys: |
            ${{ env.PYTHON_VERSION }}-
            pip-
 
      - name: Check and conditionally remove invalid virtual environment
        run: |
          if [ -d ".venv" ] && [ ! -f ".venv/bin/python" ]; then
            echo "Virtual environment exists but Python executable is missing. Rebuilding."
            rm -rf .venv
          elif [ ! -d ".venv" ]; then
            echo "No virtual environment found. Will build new one."
          else
            echo "Virtual environment appears valid. Reusing."
          fi

      - name: Install dependencies
        run: pipenv sync
        env:
          PIPENV_DEFAULT_PYTHON_VERSION: ${{ env.PYTHON_VERSION }}
 
      - name: Sync spiders to Airtable
        if: steps.changed.outputs.any_changed == 'true'
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE: ${{ secrets.AIRTABLE_TABLE_ID }}
        run: python .github/scripts/sync_spiders.py ${{ steps.changed.outputs.all_changed_files }}